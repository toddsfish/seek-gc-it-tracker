<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; base-uri 'none'; form-action 'none'">
<title>Seek Gold Coast IT — daily keywords</title>
<style>
:root{--bg:#0f1419;--panel:#1a2029;--line:#2a3340;--fg:#e6edf3;--mut:#8b98a5;--acc:#4aa3df;--acc2:#3fb950}
*{box-sizing:border-box}
body{margin:0;font:14px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--fg)}
header{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}
h1{font-size:18px;margin:0}.sub{color:var(--mut);font-size:13px}
.wrap{padding:20px 24px;max-width:1200px;margin:0 auto}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px}
.card .n{font-size:26px;font-weight:700}.card .l{color:var(--mut);font-size:12px;text-transform:uppercase;letter-spacing:.04em}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:20px}
.panel h2{font-size:13px;margin:0 0 10px;color:var(--mut);text-transform:uppercase;letter-spacing:.04em}
.bar{display:flex;align-items:center;gap:8px;margin:4px 0;font-size:13px}
.bar .t{width:140px;color:var(--fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.bar .t:hover{color:var(--acc)}
.bar .track{flex:1;background:#22303d;border-radius:4px;height:16px;overflow:hidden}
.bar .fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2))}
.bar .v{width:44px;text-align:right;color:var(--mut)}
.controls{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
input[type=search]{flex:1;min-width:220px;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:9px 12px;color:var(--fg);font-size:14px}
select{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:9px 12px;color:var(--fg)}
button.clear{background:#22303d;border:1px solid var(--line);border-radius:8px;padding:9px 12px;color:var(--fg);cursor:pointer}
table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
th,td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:top}
th{color:var(--mut);cursor:pointer;user-select:none;font-weight:600}
tr:last-child td{border-bottom:none}tbody tr:hover td{background:#202832}
a{color:var(--acc);text-decoration:none}a:hover{text-decoration:underline}
.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{background:#22303d;border:1px solid var(--line);border-radius:999px;padding:1px 8px;font-size:11px;cursor:pointer;white-space:nowrap}
.chip:hover{border-color:var(--acc)}
.count{color:var(--mut);font-size:13px;margin:8px 2px}
.desc{color:var(--mut);font-size:13px;padding:4px 12px 12px;max-width:900px}
.desc *{max-width:100%}
.trow{cursor:pointer}
.err{padding:40px;color:#f0883e}
</style>
</head>
<body>
<header>
  <h1>🕷️ Seek Gold Coast IT</h1>
  <span class="sub" id="meta"></span>
  <span style="margin-left:auto"><select id="dateSel" title="snapshot date"></select></span>
</header>
<div class="wrap" id="wrap">
  <div class="cards" id="cards"></div>
  <div class="panel">
    <h2>Top title keywords <span class="sub">(click to filter jobs)</span></h2>
    <div id="kw"></div>
  </div>
  <div class="controls">
    <input type="search" id="q" placeholder="Filter by title, company, suburb, keyword…">
    <select id="fwt"><option value="">All work types</option></select>
    <button class="clear" id="clear">Clear</button>
  </div>
  <div class="count" id="count"></div>
  <table>
    <thead><tr>
      <th data-k="job_title">Title</th>
      <th data-k="business_name">Company</th>
      <th data-k="work_type">Type</th>
      <th data-k="area">Location</th>
      <th data-k="posted_date">Posted</th>
      <th>Link</th>
    </tr></thead>
    <tbody id="tb"></tbody>
  </table>
</div>

<script src="purify.min.js"></script>
<script src="app.js"></script>
</body>
</html>
