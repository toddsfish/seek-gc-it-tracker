<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Seek Gold Coast IT — daily keywords</title>
<style>
:root{--bg:#0f1419;--panel:#1a2029;--line:#2a3340;--fg:#e6edf3;--mut:#8b98a5;--acc:#4aa3df;--acc2:#3fb950}
*{box-sizing:border-box}
body{margin:0;font:14px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--fg)}
header{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}
h1{font-size:18px;margin:0}.sub{color:var(--mut);font-size:13px}
.wrap{padding:20px 24px;max-width:1200px;margin:0 auto}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px}
.card .n{font-size:26px;font-weight:700}.card .l{color:var(--mut);font-size:12px;text-transform:uppercase;letter-spacing:.04em}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:20px}
.panel h2{font-size:13px;margin:0 0 10px;color:var(--mut);text-transform:uppercase;letter-spacing:.04em}
.bar{display:flex;align-items:center;gap:8px;margin:4px 0;font-size:13px}
.bar .t{width:140px;color:var(--fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.bar .t:hover{color:var(--acc)}
.bar .track{flex:1;background:#22303d;border-radius:4px;height:16px;overflow:hidden}
.bar .fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2))}
.bar .v{width:44px;text-align:right;color:var(--mut)}
.controls{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
input[type=search]{flex:1;min-width:220px;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:9px 12px;color:var(--fg);font-size:14px}
select{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:9px 12px;color:var(--fg)}
button.clear{background:#22303d;border:1px solid var(--line);border-radius:8px;padding:9px 12px;color:var(--fg);cursor:pointer}
table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
th,td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:top}
th{color:var(--mut);cursor:pointer;user-select:none;font-weight:600}
tr:last-child td{border-bottom:none}tbody tr:hover td{background:#202832}
a{color:var(--acc);text-decoration:none}a:hover{text-decoration:underline}
.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{background:#22303d;border:1px solid var(--line);border-radius:999px;padding:1px 8px;font-size:11px;cursor:pointer;white-space:nowrap}
.chip:hover{border-color:var(--acc)}
.count{color:var(--mut);font-size:13px;margin:8px 2px}
.desc{color:var(--mut);font-size:13px;padding:4px 12px 12px;max-width:900px}
.desc *{max-width:100%}
.trow{cursor:pointer}
.err{padding:40px;color:#f0883e}
</style>
</head>
<body>
<header>
  <h1>🕷️ Seek Gold Coast IT</h1>
  <span class="sub" id="meta"></span>
  <span style="margin-left:auto"><select id="dateSel" title="snapshot date"></select></span>
</header>
<div class="wrap" id="wrap">
  <div class="cards" id="cards"></div>
  <div class="panel">
    <h2>Top title keywords <span class="sub">(click to filter jobs)</span></h2>
    <div id="kw"></div>
  </div>
  <div class="controls">
    <input type="search" id="q" placeholder="Filter by title, company, suburb, keyword…">
    <select id="fwt"><option value="">All work types</option></select>
    <button class="clear" id="clear">Clear</button>
  </div>
  <div class="count" id="count"></div>
  <table>
    <thead><tr>
      <th data-k="job_title">Title</th>
      <th data-k="business_name">Company</th>
      <th data-k="work_type">Type</th>
      <th data-k="area">Location</th>
      <th data-k="posted_date">Posted</th>
      <th>Link</th>
    </tr></thead>
    <tbody id="tb"></tbody>
  </table>
</div>

<script>
const esc = s => (s==null?"":String(s)).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const fdate = s => { if(!s) return ""; const d=new Date(s); return isNaN(d)?"":d.toISOString().slice(0,10); };
let DATA=null, sortK="posted_date", sortDir=-1, kwFilter="";

const $ = id => document.getElementById(id);

async function loadManifest(){
  try{
    const m = await (await fetch("data/manifest.json",{cache:"no-store"})).json();
    const sel = $("dateSel");
    sel.innerHTML = '<option value="data/latest.json">latest</option>' +
      (m.dates||[]).filter(d=>d!==m.latest_date)
        .map(d=>`<option value="data/${d}.json">${d}</option>`).join("");
    sel.onchange = () => load(sel.value);
  }catch(e){ /* manifest optional */ }
}

async function load(url="data/latest.json"){
  try{
    DATA = await (await fetch(url,{cache:"no-store"})).json();
  }catch(e){
    $("wrap").innerHTML = `<div class="err">Could not load ${esc(url)} — run the scraper first.</div>`;
    return;
  }
  render();
}

function render(){
  const d = DATA;
  $("meta").textContent = `${d.region} · ${d.date} · ${d.total_jobs} jobs`;

  // cards
  const cos = new Set(d.jobs.map(j=>j.business_name).filter(Boolean)).size;
  const withPay = d.jobs.filter(j=>j.pay_range).length;
  $("cards").innerHTML = [["Jobs",d.total_jobs],["Employers",cos],
    ["Keywords",d.keywords.length],["With pay label",withPay]]
    .map(([l,n])=>`<div class="card"><div class="n">${n}</div><div class="l">${l}</div></div>`).join("");

  // keyword bars (top 25)
  const top = d.keywords.slice(0,25);
  const max = top.length ? top[0].count : 1;
  $("kw").innerHTML = top.map(k=>
    `<div class="bar"><div class="t" data-w="${esc(k.term)}" title="${esc(k.term)}">${esc(k.term)}</div>`+
    `<div class="track"><div class="fill" style="width:${k.count/max*100}%"></div></div>`+
    `<div class="v">${k.count}</div></div>`).join("");
  $("kw").querySelectorAll(".t").forEach(el=>el.onclick=()=>{kwFilter=el.dataset.w;$("q").value="";renderTable();});

  // work type filter
  const wts = [...new Set(d.jobs.map(j=>j.work_type).filter(Boolean))].sort();
  $("fwt").innerHTML = '<option value="">All work types</option>' +
    wts.map(w=>`<option value="${esc(w)}">${esc(w)}</option>`).join("");

  renderTable();
}

function renderTable(){
  const term = $("q").value.toLowerCase();
  const wt = $("fwt").value;
  let rows = DATA.jobs.filter(j=>{
    if(kwFilter && !(j.keywords||[]).includes(kwFilter)) return false;
    if(wt && j.work_type!==wt) return false;
    if(term){
      const hay = (j.job_title+" "+j.business_name+" "+j.area+" "+(j.suburb||"")+" "+(j.keywords||[]).join(" ")).toLowerCase();
      if(!hay.includes(term)) return false;
    }
    return true;
  });
  rows.sort((a,b)=>{let x=a[sortK]||"",y=b[sortK]||"";return x<y?-sortDir:x>y?sortDir:0;});

  $("count").textContent = rows.length + " shown" + (kwFilter?` · keyword: "${kwFilter}"`:"");
  const tb = $("tb");
  tb.innerHTML = rows.map((j,i)=>
    `<tr class="trow" data-i="${i}">
       <td>${esc(j.job_title)}<div class="chips">${(j.keywords||[]).slice(0,8).map(k=>`<span class="chip" data-w="${esc(k)}">${esc(k)}</span>`).join("")}</div></td>
       <td>${esc(j.business_name)}</td><td>${esc(j.work_type)}</td>
       <td>${esc(j.area)}</td><td>${fdate(j.posted_date)}</td>
       <td><a href="${esc(j.url)}" target="_blank" rel="noopener">Seek ↗</a></td>
     </tr>
     <tr id="d${i}" style="display:none"><td colspan="6"><div class="desc">${j.job_description||"<em>no description</em>"}</div></td></tr>`
  ).join("");

  tb.querySelectorAll(".trow").forEach(tr=>tr.onclick=e=>{
    if(e.target.classList.contains("chip")){kwFilter=e.target.dataset.w;$("q").value="";renderTable();return;}
    if(e.target.tagName==="A")return;
    const dd=$("d"+tr.dataset.i); dd.style.display = dd.style.display==="none"?"":"none";
  });
}

document.querySelectorAll("th[data-k]").forEach(th=>th.onclick=()=>{
  const k=th.dataset.k; sortDir=(sortK===k)?-sortDir:1; sortK=k; renderTable();
});
$("q").oninput = ()=>{kwFilter="";renderTable();};
$("fwt").onchange = renderTable;
$("clear").onclick = ()=>{kwFilter="";$("q").value="";$("fwt").value="";renderTable();};

loadManifest();
load();
</script>
</body>
</html>
